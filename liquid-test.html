<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LiquidEther Three.js Test</title>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        overflow: hidden;
        background: linear-gradient(145deg, #163f61 0%, #4b93b6 62%, #d8edf5 145%);
        color: #f6fbff;
        font-family: -apple-system, BlinkMacSystemFont, "Avenir Next", "Helvetica Neue", "PingFang SC", sans-serif;
      }

      .stage {
        position: relative;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
      }

      #liquidEther {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
      }

      .label {
        position: relative;
        z-index: 2;
        display: grid;
        gap: 18px;
        width: min(720px, 82vw);
        padding: 10vh 0 0 8vw;
        pointer-events: none;
      }

      .label p {
        margin: 0;
        color: rgba(238, 250, 255, 0.72);
        font-size: 12px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .label h1 {
        margin: 0;
        max-width: 620px;
        font-family: "Songti SC", "STSong", serif;
        font-size: clamp(48px, 7vw, 94px);
        font-weight: 350;
        letter-spacing: 0.05em;
        line-height: 1.35;
        text-shadow: 0 0 22px rgba(225, 248, 255, 0.18);
      }
    </style>
  </head>
  <body>
    <main class="stage">
      <canvas id="liquidEther"></canvas>
      <section class="label">
        <p>LiquidEther · Three.js local module test</p>
        <h1>流体背景验证页</h1>
      </section>
    </main>

    <script type="module">
      import * as THREE from "./node_modules/three/build/three.module.js";

      const options = {
        mouseForce: 17,
        cursorSize: 80,
        isViscous: true,
        viscous: 20,
        iterationsViscous: 24,
        iterationsPoisson: 28,
        dt: 0.014,
        BFECC: true,
        resolution: 0.5,
        isBounce: false,
        colors: ["#598fe9", "#74aed5", "#96cfff"],
        autoDemo: true,
        autoSpeed: 0.4,
        autoIntensity: 1.5,
        takeoverDuration: 0.25,
        autoResumeDelay: 3000,
        autoRampDuration: 0.6
      };

      const canvas = document.querySelector("#liquidEther");

      class MouseDriver {
        constructor(container) {
          this.container = container;
          this.coords = new THREE.Vector2(0, 0);
          this.coordsOld = new THREE.Vector2(0, 0);
          this.diff = new THREE.Vector2(0, 0);
          this.hover = false;
          this.user = false;
          this.auto = false;
          this.takeover = false;
          this.takeoverStart = 0;
          this.takeoverFrom = new THREE.Vector2();
          this.takeoverTo = new THREE.Vector2();
          this.timer = null;
        }

        setClient(clientX, clientY) {
          const rect = this.container.getBoundingClientRect();
          const nx = (clientX - rect.left) / Math.max(1, rect.width);
          const ny = (clientY - rect.top) / Math.max(1, rect.height);
          this.coords.set(nx * 2 - 1, -(ny * 2 - 1));
          if (this.timer) window.clearTimeout(this.timer);
          this.timer = window.setTimeout(() => {
            this.diff.set(0, 0);
          }, 100);
        }

        move(event) {
          const rect = this.container.getBoundingClientRect();
          const inside = event.clientX >= rect.left && event.clientX <= rect.right && event.clientY >= rect.top && event.clientY <= rect.bottom;
          if (!inside) return false;
          this.hover = true;
          if (this.auto && !this.user && !this.takeover) {
            const nx = (event.clientX - rect.left) / Math.max(1, rect.width);
            const ny = (event.clientY - rect.top) / Math.max(1, rect.height);
            this.takeoverFrom.copy(this.coords);
            this.takeoverTo.set(nx * 2 - 1, -(ny * 2 - 1));
            this.takeoverStart = performance.now();
            this.takeover = true;
            this.user = true;
            this.auto = false;
            return true;
          }
          this.setClient(event.clientX, event.clientY);
          this.user = true;
          return true;
        }

        update(now) {
          if (this.takeover) {
            const t = (now - this.takeoverStart) / (options.takeoverDuration * 1000);
            if (t >= 1) {
              this.takeover = false;
              this.coords.copy(this.takeoverTo);
              this.coordsOld.copy(this.coords);
              this.diff.set(0, 0);
            } else {
              const k = t * t * (3 - 2 * t);
              this.coords.copy(this.takeoverFrom).lerp(this.takeoverTo, k);
            }
          }
          this.diff.subVectors(this.coords, this.coordsOld);
          this.coordsOld.copy(this.coords);
          if (this.auto && !this.takeover) this.diff.multiplyScalar(options.autoIntensity);
        }
      }

      class AutoDriver {
        constructor(mouse) {
          this.mouse = mouse;
          this.active = false;
          this.current = new THREE.Vector2();
          this.target = new THREE.Vector2();
          this.lastTime = performance.now();
          this.activationTime = 0;
          this.margin = 0.2;
          this.pick();
        }

        pick() {
          this.target.set((Math.random() * 2 - 1) * (1 - this.margin), (Math.random() * 2 - 1) * (1 - this.margin));
        }

        stop() {
          this.active = false;
          this.mouse.auto = false;
        }

        update(now, lastUserInteraction) {
          if (!options.autoDemo) return;
          if (now - lastUserInteraction < options.autoResumeDelay || this.mouse.hover) {
            if (this.active) this.stop();
            return;
          }
          if (!this.active) {
            this.active = true;
            this.current.copy(this.mouse.coords);
            this.lastTime = now;
            this.activationTime = now;
          }
          this.mouse.auto = true;
          let dtSec = (now - this.lastTime) / 1000;
          this.lastTime = now;
          if (dtSec > 0.2) dtSec = 0.016;
          const dir = this.target.clone().sub(this.current);
          const dist = dir.length();
          if (dist < 0.01) {
            this.pick();
            return;
          }
          dir.normalize();
          const t = Math.min(1, (now - this.activationTime) / (options.autoRampDuration * 1000));
          const ramp = t * t * (3 - 2 * t);
          this.current.addScaledVector(dir, Math.min(options.autoSpeed * dtSec * ramp, dist));
          this.mouse.coords.copy(this.current);
        }
      }

      class LiquidEtherTest {
        constructor(canvas) {
          this.canvas = canvas;
          this.renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
          this.renderer.autoClear = false;
          this.renderer.setClearColor(new THREE.Color(0x000000), 0);
          this.clock = new THREE.Clock();
          this.mouse = new MouseDriver(canvas);
          this.auto = new AutoDriver(this.mouse);
          this.lastUserInteraction = performance.now();
          this.scene = new THREE.Scene();
          this.camera = new THREE.Camera();
          this.quad = new THREE.PlaneGeometry(2, 2);
          this.palette = options.colors.map((color) => new THREE.Color(color));
          this.initPasses();
          this.resize();
          this.bind();
          this.clock.start();
          this.loop();
        }

        bind() {
          window.addEventListener("resize", () => this.resize());
          window.addEventListener("mousemove", (event) => {
            if (this.mouse.move(event)) {
              this.lastUserInteraction = performance.now();
              this.auto.stop();
            }
          });
          document.addEventListener("mouseleave", () => {
            this.mouse.hover = false;
            this.mouse.user = false;
          });
        }

        target() {
          const isIOS = /(iPad|iPhone|iPod)/i.test(navigator.userAgent);
          const opts = {
            type: isIOS ? THREE.HalfFloatType : THREE.FloatType,
            minFilter: THREE.LinearFilter,
            magFilter: THREE.LinearFilter,
            wrapS: THREE.ClampToEdgeWrapping,
            wrapT: THREE.ClampToEdgeWrapping,
            depthBuffer: false,
            stencilBuffer: false
          };
          return new THREE.WebGLRenderTarget(this.fboWidth, this.fboHeight, opts);
        }

        material(fragment, uniforms) {
          return new THREE.RawShaderMaterial({
            vertexShader: `
              precision highp float;
              attribute vec3 position;
              varying vec2 uv;
              void main() {
                uv = position.xy * 0.5 + 0.5;
                gl_Position = vec4(position.xy, 0.0, 1.0);
              }
            `,
            fragmentShader: fragment,
            uniforms
          });
        }

        mesh(material) {
          const scene = new THREE.Scene();
          scene.add(new THREE.Mesh(this.quad, material));
          return { scene, material };
        }

        initPasses() {
          this.advection = this.mesh(this.material(`
            precision highp float;
            uniform sampler2D velocity;
            uniform float dt;
            uniform bool isBFECC;
            uniform vec2 fboSize;
            varying vec2 uv;
            void main() {
              vec2 ratio = max(fboSize.x, fboSize.y) / fboSize;
              if (!isBFECC) {
                vec2 vel = texture2D(velocity, uv).xy;
                gl_FragColor = vec4(texture2D(velocity, uv - vel * dt * ratio).xy * 0.992, 0.0, 1.0);
              } else {
                vec2 spot_new = uv;
                vec2 vel_old = texture2D(velocity, uv).xy;
                vec2 spot_old = spot_new - vel_old * dt * ratio;
                vec2 vel_new1 = texture2D(velocity, spot_old).xy;
                vec2 spot_new2 = spot_old + vel_new1 * dt * ratio;
                vec2 error = spot_new2 - spot_new;
                vec2 spot_new3 = spot_new - error / 2.0;
                vec2 vel_2 = texture2D(velocity, spot_new3).xy;
                vec2 spot_old2 = spot_new3 - vel_2 * dt * ratio;
                gl_FragColor = vec4(texture2D(velocity, spot_old2).xy * 0.992, 0.0, 1.0);
              }
            }
          `, {
            velocity: { value: null },
            dt: { value: options.dt },
            isBFECC: { value: options.BFECC },
            fboSize: { value: new THREE.Vector2() }
          }));

          this.force = this.mesh(this.material(`
            precision highp float;
            uniform sampler2D velocity;
            uniform vec2 force;
            uniform vec2 center;
            uniform vec2 scale;
            varying vec2 uv;
            void main() {
              vec2 vel = texture2D(velocity, uv).xy;
              vec2 circle = (uv - center) / scale;
              float d = 1.0 - min(length(circle), 1.0);
              d *= d;
              gl_FragColor = vec4(vel + force * d, 0.0, 1.0);
            }
          `, {
            velocity: { value: null },
            force: { value: new THREE.Vector2() },
            center: { value: new THREE.Vector2() },
            scale: { value: new THREE.Vector2() }
          }));

          this.viscous = this.mesh(this.material(`
            precision highp float;
            uniform sampler2D velocity;
            uniform sampler2D velocity_new;
            uniform float v;
            uniform vec2 px;
            uniform float dt;
            varying vec2 uv;
            void main() {
              vec2 old = texture2D(velocity, uv).xy;
              vec2 n0 = texture2D(velocity_new, uv + vec2(px.x * 2.0, 0.0)).xy;
              vec2 n1 = texture2D(velocity_new, uv - vec2(px.x * 2.0, 0.0)).xy;
              vec2 n2 = texture2D(velocity_new, uv + vec2(0.0, px.y * 2.0)).xy;
              vec2 n3 = texture2D(velocity_new, uv - vec2(0.0, px.y * 2.0)).xy;
              vec2 next = 4.0 * old + v * dt * (n0 + n1 + n2 + n3);
              next /= 4.0 * (1.0 + v * dt);
              gl_FragColor = vec4(next, 0.0, 1.0);
            }
          `, {
            velocity: { value: null },
            velocity_new: { value: null },
            v: { value: options.viscous },
            px: { value: new THREE.Vector2() },
            dt: { value: options.dt }
          }));

          this.divergence = this.mesh(this.material(`
            precision highp float;
            uniform sampler2D velocity;
            uniform vec2 px;
            uniform float dt;
            varying vec2 uv;
            void main() {
              float x0 = texture2D(velocity, uv - vec2(px.x, 0.0)).x;
              float x1 = texture2D(velocity, uv + vec2(px.x, 0.0)).x;
              float y0 = texture2D(velocity, uv - vec2(0.0, px.y)).y;
              float y1 = texture2D(velocity, uv + vec2(0.0, px.y)).y;
              gl_FragColor = vec4(((x1 - x0 + y1 - y0) / 2.0) / dt, 0.0, 0.0, 1.0);
            }
          `, {
            velocity: { value: null },
            px: { value: new THREE.Vector2() },
            dt: { value: options.dt }
          }));

          this.poisson = this.mesh(this.material(`
            precision highp float;
            uniform sampler2D pressure;
            uniform sampler2D divergence;
            uniform vec2 px;
            varying vec2 uv;
            void main() {
              float p0 = texture2D(pressure, uv + vec2(px.x * 2.0, 0.0)).r;
              float p1 = texture2D(pressure, uv - vec2(px.x * 2.0, 0.0)).r;
              float p2 = texture2D(pressure, uv + vec2(0.0, px.y * 2.0)).r;
              float p3 = texture2D(pressure, uv - vec2(0.0, px.y * 2.0)).r;
              float div = texture2D(divergence, uv).r;
              gl_FragColor = vec4((p0 + p1 + p2 + p3) / 4.0 - div, 0.0, 0.0, 1.0);
            }
          `, {
            pressure: { value: null },
            divergence: { value: null },
            px: { value: new THREE.Vector2() }
          }));

          this.pressure = this.mesh(this.material(`
            precision highp float;
            uniform sampler2D pressure;
            uniform sampler2D velocity;
            uniform vec2 px;
            uniform float dt;
            varying vec2 uv;
            void main() {
              float p0 = texture2D(pressure, uv + vec2(px.x, 0.0)).r;
              float p1 = texture2D(pressure, uv - vec2(px.x, 0.0)).r;
              float p2 = texture2D(pressure, uv + vec2(0.0, px.y)).r;
              float p3 = texture2D(pressure, uv - vec2(0.0, px.y)).r;
              vec2 v = texture2D(velocity, uv).xy;
              vec2 gradP = vec2(p0 - p1, p2 - p3) * 0.5;
              gl_FragColor = vec4(v - gradP * dt, 0.0, 1.0);
            }
          `, {
            pressure: { value: null },
            velocity: { value: null },
            px: { value: new THREE.Vector2() },
            dt: { value: options.dt }
          }));

          this.output = this.mesh(this.material(`
            precision highp float;
            uniform sampler2D velocity;
            uniform vec3 color0;
            uniform vec3 color1;
            uniform vec3 color2;
            varying vec2 uv;
            void main() {
              vec2 vel = texture2D(velocity, uv).xy;
              float lenv = clamp(length(vel) * 1.8, 0.0, 1.0);
              vec3 c = mix(color0, color1, smoothstep(0.05, 0.52, lenv));
              c = mix(c, color2, smoothstep(0.42, 1.0, lenv));
              float a = smoothstep(0.012, 0.88, lenv) * 0.82;
              gl_FragColor = vec4(c, a);
            }
          `, {
            velocity: { value: null },
            color0: { value: this.palette[0] },
            color1: { value: this.palette[1] },
            color2: { value: this.palette[2] }
          }));
        }

        resize() {
          const ratio = Math.min(window.devicePixelRatio || 1, 2);
          const width = Math.max(1, Math.floor(window.innerWidth));
          const height = Math.max(1, Math.floor(window.innerHeight));
          this.renderer.setPixelRatio(ratio);
          this.renderer.setSize(width, height, false);
          this.fboWidth = Math.max(2, Math.round(width * options.resolution));
          this.fboHeight = Math.max(2, Math.round(height * options.resolution));
          this.px = new THREE.Vector2(1 / this.fboWidth, 1 / this.fboHeight);
          this.fboSize = new THREE.Vector2(this.fboWidth, this.fboHeight);
          this.vel0 = this.target();
          this.vel1 = this.target();
          this.visc0 = this.target();
          this.visc1 = this.target();
          this.div = this.target();
          this.pressure0 = this.target();
          this.pressure1 = this.target();
        }

        renderPass(pass, target) {
          this.renderer.setRenderTarget(target);
          this.renderer.render(pass.scene, this.camera);
          this.renderer.setRenderTarget(null);
        }

        simulate() {
          this.advection.material.uniforms.velocity.value = this.vel0.texture;
          this.advection.material.uniforms.fboSize.value.copy(this.fboSize);
          this.renderPass(this.advection, this.vel1);

          const cursorX = options.cursorSize / this.fboWidth;
          const cursorY = options.cursorSize / this.fboHeight;
          this.force.material.uniforms.velocity.value = this.vel1.texture;
          this.force.material.uniforms.force.value.set((this.mouse.diff.x / 2) * options.mouseForce, (this.mouse.diff.y / 2) * options.mouseForce);
          this.force.material.uniforms.center.value.set(
            THREE.MathUtils.clamp(this.mouse.coords.x * 0.5 + 0.5, cursorX + this.px.x * 2, 1 - cursorX - this.px.x * 2),
            THREE.MathUtils.clamp(this.mouse.coords.y * 0.5 + 0.5, cursorY + this.px.y * 2, 1 - cursorY - this.px.y * 2)
          );
          this.force.material.uniforms.scale.value.set(cursorX, cursorY);
          this.renderPass(this.force, this.vel0);

          let vel = this.vel0;
          if (options.isViscous) {
            for (let i = 0; i < options.iterationsViscous; i += 1) {
              this.viscous.material.uniforms.velocity.value = vel.texture;
              this.viscous.material.uniforms.velocity_new.value = (i % 2 === 0 ? this.visc0 : this.visc1).texture;
              this.viscous.material.uniforms.px.value.copy(this.px);
              this.renderPass(this.viscous, i % 2 === 0 ? this.visc1 : this.visc0);
            }
            vel = options.iterationsViscous % 2 === 0 ? this.visc0 : this.visc1;
          }

          this.divergence.material.uniforms.velocity.value = vel.texture;
          this.divergence.material.uniforms.px.value.copy(this.px);
          this.renderPass(this.divergence, this.div);

          for (let i = 0; i < options.iterationsPoisson; i += 1) {
            this.poisson.material.uniforms.pressure.value = (i % 2 === 0 ? this.pressure0 : this.pressure1).texture;
            this.poisson.material.uniforms.divergence.value = this.div.texture;
            this.poisson.material.uniforms.px.value.copy(this.px);
            this.renderPass(this.poisson, i % 2 === 0 ? this.pressure1 : this.pressure0);
          }

          this.pressure.material.uniforms.pressure.value = (options.iterationsPoisson % 2 === 0 ? this.pressure0 : this.pressure1).texture;
          this.pressure.material.uniforms.velocity.value = vel.texture;
          this.pressure.material.uniforms.px.value.copy(this.px);
          this.renderPass(this.pressure, this.vel1);

          [this.vel0, this.vel1] = [this.vel1, this.vel0];
        }

        loop() {
          const now = performance.now();
          this.auto.update(now, this.lastUserInteraction);
          this.mouse.update(now);
          this.simulate();
          this.renderer.setRenderTarget(null);
          this.output.material.uniforms.velocity.value = this.vel0.texture;
          this.renderer.render(this.output.scene, this.camera);
          requestAnimationFrame(() => this.loop());
        }
      }

      new LiquidEtherTest(canvas);
    </script>
  </body>
</html>
